# Example Secret - use as reference. Do NOT commit real secrets.
# Create secret with: kubectl create secret generic auth-service-secret --from-literal=...
# Or apply this after replacing placeholder values (base64-encoded).
apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  labels:
    app: auth-service
type: Opaque
stringData:
  # Database (adjust keys if your app expects different names)
  DATABASE_URL: "jdbc:postgresql://postgres:5432/auth_db"
  DATABASE_USERNAME: "auth_user"
  DATABASE_PASSWORD: "CHANGE_ME"

  # JWT - secret must be at least 32 characters for HS256
  JWT_SECRET: "CHANGE_ME_TO_AT_LEAST_32_CHARS_SECRET_KEY"
  JWT_EXPIRATION_MS: "900000"
  JWT_ISSUER: "auth-service"

  # Optional
  # LOG_LEVEL: "INFO"
  # DB_POOL_SIZE: "10"
  # DB_SCHEMA: "public"
