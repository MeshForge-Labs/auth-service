# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - booking-auth-service

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: mybookingacr.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_DCF9BA6DC7394034ADB932A1615D7CD1 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_84F155A71BE34425BBA592D018920C6F }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: mybookingacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_DCF9BA6DC7394034ADB932A1615D7CD1 }}/auth-service:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout

    needs: build
    
    steps:
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E25574AB309C45588EE0F6A3FA2A1B15 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A54B01F8B48046A09ED10CB6A736E054 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_8A859BCD6E8B4B808AD3D5DB565AEA51 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'booking-auth-service'
          slot-name: 'Production'
          images: 'mybookingacr.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_DCF9BA6DC7394034ADB932A1615D7CD1 }}/auth-service:${{ github.sha }}'
          